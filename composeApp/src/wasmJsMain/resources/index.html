<!DOCTYPE html>

    <meta charset="UTF-8">

    <!-- ===== Domain Redirect (must run first) ===== -->
    <script>
    (function() {
        var h = location.hostname;
        if (h !== "winedown.app" && h !== "localhost" && h !== "127.0.0.1") {
            location.replace("https://winedown.app" + location.pathname + location.hash);
        }
    })();
    </script>

    <!-- ===== Primary Meta Tags ===== -->
    <title>Wine Down Wednesday — Your Wine Community, Uncorked</title>
    <meta name="description" content="Wine Down Wednesday is a vibrant community for wine lovers. Explore events, discover wines, listen to our Uncorked Conversations podcast, connect with fellow enthusiasts, and more.">
    <meta name="keywords" content="wine, wine club, wine community, wine tasting, wine events, wine down wednesday, uncorked conversations, podcast, wine lovers">
    <meta name="author" content="Wine Down Wednesday">
    <meta name="theme-color" content="#FF7F33">

    <!-- ===== Canonical URL ===== -->
    <link rel="canonical" href="https://winedown.app/">

    <!-- ===== Open Graph (Facebook, LinkedIn, iMessage, Slack, Discord) ===== -->

    <meta name="twitter:image" content="https://winedown.app/og-image.png">

                ]
            },
            {
                "@type": "WebSite",
                "name": "Wine Down Wednesday",
                "url": "https://winedown.app"
            },
            {
                "@type": "WebApplication",
                "name": "Wine Down Wednesday",
                "url": "https://winedown.app",
                "operatingSystem": "Web, Android, iOS",
                "applicationCategory": "LifestyleApplication",
                "installUrl": [
                    "https://play.google.com/store/apps/details?id=net.winedownwednesday.android",
                    "https://apps.apple.com/us/app/wine-down-wednesday/id6760641629"
                ],
                "offers": {
                    "@type": "Offer",
                    "price": "0",
                    "priceCurrency": "USD"
                }

        ]
    }

<!-- Hidden label+switch for iOS 17.4+ haptic feedback (WebKit Taptic Engine trigger).
     Clicking the LABEL triggers the native switch toggle haptic. -->
<label id="wdw-haptic-label" for="wdw-haptic-switch"
       style="display:none;" aria-hidden="true">
    <input id="wdw-haptic-switch" type="checkbox" switch
           style="all:initial;appearance:auto;display:none;">
</label>
