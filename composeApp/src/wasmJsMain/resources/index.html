<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, interactive-widget=resizes-content">
    <title>wdw-web</title>
    <link type="text/css" rel="stylesheet" href="styles.css">
    <script type="application/javascript" src="webauthn-bridge.js"></script>
    <script type="module" src="firebase-bridge.js"></script>
    <script type="module" src="stream-bridge.js"></script>
    <script type="application/javascript" src="youtube-bridge.js"></script>
    <script type="application/javascript" src="composeApp.js?v=2"></script>
</head>
<body>
<!-- Hidden label+switch for iOS 17.4+ haptic feedback (WebKit Taptic Engine trigger).
     Clicking the LABEL triggers the native switch toggle haptic. -->
<label id="wdw-haptic-label" for="wdw-haptic-switch"
       style="display:none;" aria-hidden="true">
    <input id="wdw-haptic-switch" type="checkbox" switch
           style="all:initial;appearance:auto;display:none;">
</label>
</body>
</html>
